<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Riwayat Transaksi</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Riwayat Transaksi</h1>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Tanggal</th>
          <th>Tipe</th>
          <th>Kategori</th>
          <th>Jumlah</th>
        </tr>
      </thead>
      <tbody id="tabelTransaksi"></tbody>
    </table>
    <br />
    <h3>Rekap</h3>
    <p>Total Pemasukan: <span id="totalPemasukan"></span></p>
    <p>Total Pengeluaran: <span id="totalPengeluaran"></span></p>
    <p>Saldo: <span id="saldo"></span></p>

    <br />
    <a href="index.html">Kembali ke Dashboard</a>
    <script src="transaksi.js"></script>
  </body>
</html>
